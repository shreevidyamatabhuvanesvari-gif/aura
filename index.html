<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AURA Brain Console</title>

<meta name="description" content="AURA Autonomous Knowledge System">

<style>
:root{
    --bg:#0f172a;
    --panel:#111827;
    --accent:#22c55e;
    --text:#f8fafc;
    --muted:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:system-ui,sans-serif;
    min-height:100vh;
}

header{
    padding:20px;
    border-bottom:1px solid #1e293b;
}

h1{
    font-size:1.8rem;
}

.subtitle{
    margin-top:6px;
    color:var(--muted);
}

main{
    padding:20px;
}

.panel{
    background:var(--panel);
    padding:20px;
    border-radius:12px;
}

.status{
    display:flex;
    align-items:center;
    gap:10px;
}

.indicator{
    width:12px;
    height:12px;
    border-radius:50%;
    background:var(--accent);
}

.console{
    margin-top:20px;
}

label{
    display:block;
    margin-bottom:8px;
}

textarea{
    width:100%;
    min-height:120px;
    border:none;
    outline:none;
    resize:vertical;
    border-radius:10px;
    padding:12px;
    font-size:14px;
}

button{
    margin-top:12px;
    padding:10px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    background:var(--accent);
}

.output{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    background:#020617;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<header>
    <h1>AURA Brain Console</h1>
    <div class="subtitle">
        Autonomous Knowledge System Bootstrap
    </div>
</header>

<main>

<div class="panel">

    <div class="status">
        <div class="indicator"></div>
        <span>System Ready</span>
    </div>

    <div class="console">

        <label for="command">Command</label>

        <textarea
            id="command"
            placeholder="Example: Learn Java">
        </textarea>

        <button onclick="runCommand()">
            Execute
        </button>

        <div class="output" id="output">
Awaiting command...
        </div>

    </div>

</div>

</main>
    <script src="assets/js/task-manager.js"></script>
<script src="assets/js/storage-engine.js"></script>
<script src="assets/js/knowledge-engine.js"></script>
<script src="assets/js/learning-engine.js"></script> 
    <script src="assets/js/knowledge-import-engine.js"></script>
    <script src="assets/js/knowledge-graph-engine.js"></script>
    <script src="assets/js/reasoning-engine.js"></script>
    <script src="assets/js/self-critic-engine.js"></script>
    <script src="assets/js/planner-engine.js"></script>
    <script src="assets/js/memory-consolidation-engine.js"></script>
    <script src="assets/js/insight-engine.js"></script>
    <script src="assets/js/command-registry.js"></script>
    <script src="assets/js/command-bootstrap.js"></script>
    <script src="assets/js/command-bootstrap-v2.js"></script>
    <script src="assets/js/command-bootstrap-v3.js"></script>
<script src="assets/js/core-command-engine-v9.js"></script>

</body>
</html>
